<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>成約事例みえる</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Hiragino Kaku Gothic ProN",sans-serif;background:#f5f7fa;color:#333}
.header{background:linear-gradient(135deg,#1a73e8,#0d47a1);color:#fff;padding:20px;text-align:center}
.header h1{font-size:1.5em;margin-bottom:4px}
.header p{font-size:0.85em;opacity:0.85}
.search-area{max-width:800px;margin:20px auto;padding:0 16px}
.search-box{display:flex;gap:8px;margin-bottom:12px}
.search-box input{flex:1;padding:12px 16px;border:2px solid #ddd;border-radius:8px;font-size:16px;outline:none;transition:border-color 0.2s}
.search-box input:focus{border-color:#1a73e8}
.search-box button{padding:12px 24px;background:#1a73e8;color:#fff;border:none;border-radius:8px;font-size:16px;cursor:pointer}
.search-box button:hover{background:#1557b0}
.filters{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:12px}
.filters label{display:flex;align-items:center;gap:4px;font-size:14px;cursor:pointer;background:#fff;padding:4px 10px;border-radius:16px;border:1px solid #ddd}
.filters label input{accent-color:#1a73e8}
.info{font-size:13px;color:#666;margin-bottom:8px}
.results{max-width:800px;margin:0 auto;padding:0 16px 40px}
.card{background:#fff;border-radius:10px;box-shadow:0 1px 4px rgba(0,0,0,0.1);padding:16px;margin-bottom:12px}
.card-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.card-type{font-size:12px;padding:3px 8px;border-radius:12px;font-weight:600;color:#fff}
.type-中古マンション{background:#e67e22}
.type-新築マンション{background:#e74c3c}
.type-中古戸建{background:#27ae60}
.type-新築戸建{background:#2ecc71}
.type-売地{background:#8e44ad}
.card-price{font-size:1.3em;font-weight:700;color:#1a73e8}
.card-price span{font-size:0.6em;font-weight:400;color:#888}
.card-name{font-size:1em;font-weight:600;margin-bottom:4px}
.card-addr{font-size:0.85em;color:#666;margin-bottom:8px}
.card-details{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:4px;font-size:0.8em;color:#555}
.card-details dt{color:#999}
.card-details dd{font-weight:500}
.dist{font-size:0.75em;color:#999;margin-top:6px}
.no-results{text-align:center;padding:40px;color:#999;font-size:1.1em}
.count{font-size:14px;color:#1a73e8;font-weight:600;margin-bottom:12px}
.loading{text-align:center;padding:60px;color:#999}
.loading .spinner{display:inline-block;width:40px;height:40px;border:4px solid #ddd;border-top-color:#1a73e8;border-radius:50%;animation:spin 0.8s linear infinite;margin-bottom:12px}
@keyframes spin{to{transform:rotate(360deg)}}
.status{text-align:center;font-size:13px;color:#999;margin-bottom:8px}
</style>
</head>
<body>
<div class="header">
<h1>成約事例みえる</h1>
<p>町名やマンション名で検索 → 半径500m以内の成約事例を表示</p>
</div>
<div class="search-area">
<div class="search-box">
<input type="text" id="q" placeholder="例：諏訪野町のマンション、六ツ門町、ライオンズ..." autofocus>
<button onclick="doSearch()">検索</button>
</div>
<div class="filters">
<label><input type="checkbox" class="ft" value="中古マンション" checked>中古マンション</label>
<label><input type="checkbox" class="ft" value="新築マンション" checked>新築マンション</label>
<label><input type="checkbox" class="ft" value="中古戸建" checked>中古戸建</label>
<label><input type="checkbox" class="ft" value="新築戸建" checked>新築戸建</label>
<label><input type="checkbox" class="ft" value="売地" checked>売地</label>
</div>
<div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
<div class="status" id="status"></div>
<button id="refreshBtn" onclick="refreshData()" style="display:none;padding:4px 12px;background:#e8f0fe;color:#1a73e8;border:1px solid #1a73e8;border-radius:16px;font-size:12px;cursor:pointer">データ更新</button>
</div>
<div class="info" id="info"></div>
</div>
<div class="results" id="results">
<div class="loading"><div class="spinner"></div><div>データを読み込み中...</div></div>
</div>

<script>
const API_URL='https://script.google.com/macros/s/AKfycbzHFY5eSSBI5cvGS1WSmOS7lEXF8WqIO60FsuOrj39qWiXR__Fd4grXbZRY0evoMdwYxg/exec';

let D=[];
let locMap={};

function fmtDate(s){
  if(!s)return '';
  if(typeof s==='string' && /^\w{3} \w{3}/.test(s)){
    const d=new Date(s);
    if(!isNaN(d)){return d.getFullYear()+'年'+(d.getMonth()+1)+'月'+d.getDate()+'日'}
  }
  return String(s);
}

function applyData(items){
  D=items.filter(r=>r.lt&&r.lg).map(r=>({...r,d:fmtDate(r.d),y:fmtDate(r.y)}));
  locMap={};
  D.forEach(r=>{
    if(!locMap[r.a]){locMap[r.a]={lt:r.lt,lg:r.lg,c:1}}
    else{locMap[r.a].c++}
  });
}

function showStatus(){
  const cached=localStorage.getItem('seiyaku_date');
  const dateStr=cached?new Date(Number(cached)).toLocaleDateString('ja-JP'):'';
  document.getElementById('status').textContent=D.length+'件（'+dateStr+' 取得）';
  document.getElementById('refreshBtn').style.display='inline-block';
  document.getElementById('results').innerHTML='<div class="no-results">検索キーワードを入力してください</div>';
}

async function fetchFromServer(){
  const res=await fetch(API_URL);
  if(!res.ok)throw new Error('HTTP '+res.status);
  const items=await res.json();
  localStorage.setItem('seiyaku_data',JSON.stringify(items));
  localStorage.setItem('seiyaku_date',String(Date.now()));
  return items;
}

async function loadData(){
  try{
    const cachedData=localStorage.getItem('seiyaku_data');
    if(cachedData){
      applyData(JSON.parse(cachedData));
      showStatus();
      return;
    }
    const items=await fetchFromServer();
    applyData(items);
    showStatus();
  }catch(e){
    document.getElementById('results').innerHTML='<div class="no-results">データの読み込みに失敗しました。<br><small>'+e.message+'</small></div>';
  }
}

async function refreshData(){
  const btn=document.getElementById('refreshBtn');
  btn.textContent='更新中...';btn.disabled=true;
  try{
    const items=await fetchFromServer();
    applyData(items);
    showStatus();
    btn.textContent='更新完了!';
    setTimeout(()=>{btn.textContent='データ更新';btn.disabled=false},2000);
  }catch(e){
    btn.textContent='更新失敗';btn.disabled=false;
    alert('更新に失敗しました: '+e.message);
  }
}

function haversine(lat1,lon1,lat2,lon2){
  const R=6371000,dLat=(lat2-lat1)*Math.PI/180,dLon=(lon2-lon1)*Math.PI/180;
  const a=Math.sin(dLat/2)**2+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

function doSearch(){
  if(!D.length)return;
  const q=document.getElementById('q').value.trim();
  if(!q)return;
  const types=[...document.querySelectorAll('.ft:checked')].map(c=>c.value);

  let typeFilter=null;
  const typeKeywords={'マンション':['中古マンション','新築マンション'],'戸建':['中古戸建','新築戸建'],'土地':['売地'],'売地':['売地']};
  for(const[kw,ts]of Object.entries(typeKeywords)){
    if(q.includes(kw)){typeFilter=ts;break}
  }

  let locQuery=q.replace(/の?(マンション|戸建|土地|売地|中古|新築)/g,'').trim();
  if(!locQuery)locQuery=q;

  let center=null;
  let matchedAddr='';
  for(const[addr,info]of Object.entries(locMap)){
    if(addr.includes(locQuery)){
      if(!center||addr.length<matchedAddr.length){
        center={lt:info.lt,lg:info.lg};matchedAddr=addr;
      }
    }
  }

  if(!center){
    D.forEach(r=>{
      if(r.n&&r.n.includes(locQuery)){
        if(!center){center={lt:r.lt,lg:r.lg};matchedAddr=r.a}
      }
    });
  }

  if(!center){
    document.getElementById('results').innerHTML='<div class="no-results">該当する地名が見つかりません。<br>例：諏訪野町、六ツ門町、日吉町</div>';
    document.getElementById('info').textContent='';
    return;
  }

  let results=[];
  D.forEach(r=>{
    if(!types.includes(r.t))return;
    if(typeFilter&&!typeFilter.includes(r.t))return;
    const dist=haversine(center.lt,center.lg,r.lt,r.lg);
    if(dist<=500){results.push({...r,dist:Math.round(dist)})}
  });

  results.sort((a,b)=>a.dist-b.dist||b.p-a.p);

  document.getElementById('info').textContent='「'+matchedAddr+'」周辺（半径500m）を検索中';

  const el=document.getElementById('results');
  if(!results.length){
    el.innerHTML='<div class="no-results">半径500m以内に成約事例が見つかりません。</div>';
    return;
  }

  el.innerHTML='<div class="count">'+results.length+'件の成約事例</div>'+results.map(r=>{
    const priceStr=r.p>=10000?(r.p/10000).toFixed(r.p%10000?1:0)+'億':r.p.toLocaleString();
    return '<div class="card"><div class="card-header"><span class="card-type type-'+r.t+'">'+r.t+'</span><div class="card-price">'+priceStr+'<span> 万円</span></div></div>'+(r.n?'<div class="card-name">'+r.n+'</div>':'')+'<div class="card-addr">'+r.a+'</div><div class="card-details"><div><dt>取引時期</dt><dd>'+r.d+'</dd></div>'+(r.ba?'<div><dt>建物面積</dt><dd>'+r.ba+'㎡</dd></div>':'')+(r.la?'<div><dt>土地面積</dt><dd>'+r.la+'㎡</dd></div>':'')+(r.y?'<div><dt>建築年</dt><dd>'+r.y+'</dd></div>':'')+(r.s?'<div><dt>構造</dt><dd>'+r.s+'</dd></div>':'')+'</div><div class="dist">検索地点から約'+r.dist+'m</div></div>';
  }).join('');
}

document.getElementById('q').addEventListener('keydown',e=>{if(e.key==='Enter')doSearch()});
document.querySelectorAll('.ft').forEach(cb=>cb.addEventListener('change',()=>{if(document.getElementById('q').value.trim())doSearch()}));

loadData();
</script>
</body>
</html>
